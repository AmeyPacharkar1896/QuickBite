<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickBite</title>
  <link rel="stylesheet" href="/style.css">
</head>

<body>
  <nav>
    <div id="first-half">
      <div>
        <div id="menu-icon"></div>
        <div id="logo-name"></div>
      </div>
      <div id="user-space">
        <div>Sign Up</div>
        <div>Sign In</div>
      </div>
    </div>
    <div id="search-bar">
      <input type="search" name="restaurant-searchbar" id="restaurant-searchbar" placeholder="Search Restaurant" />
    </div>
  </nav>

  <!-- each restaurant data -->
  <div id="home-feed-container">
    <div class="home-feed-item">
      <img src="https://wallpapers.com/images/hd/brand-pictures-g2x50ziu0hdq1fbu.jpg" alt="pizza-hut">
      <div id="info-section">
        <div class="restaurant-details">
          <div id="restaurant_name">Pizza Hut</div>
          <div id="rating">4.5 <span>⭐</span></div>
        </div>
        <div id="delivery-price">₹100</div>
      </div>
    </div>
    <div class="home-feed-item">
      <img src="https://wallpapers.com/images/hd/brand-pictures-g2x50ziu0hdq1fbu.jpg" alt="pizza-hut">
      <div id="info-section">
        <div class="restaurant-details">
          <div id="restaurant_name">Pizza Hut</div>
          <div id="rating">4.5 <span>⭐</span></div>
        </div>
        <div id="delivery-price">₹100</div>
      </div>
    </div>
    <div class="home-feed-item">
      <img src="https://wallpapers.com/images/hd/brand-pictures-g2x50ziu0hdq1fbu.jpg" alt="pizza-hut">
      <div id="info-section">
        <div class="restaurant-details">
          <div id="restaurant_name">Pizza Hut</div>
          <div id="rating">4.5 <span>⭐</span></div>
        </div>
        <div id="delivery-price">₹100</div>
      </div>
    </div>
  </div>

  <!-- side filter bar -->
  <div id="side-filter-bar">
    <h3>Filters</h3>

    <!-- Cuisine Filters -->
    <div id="cuisine-filters" class="filter-group">
      <h4>Choose Cuisine</h4>
      <label>Italian<input type="checkbox" value="Italian"> </label>
      <label>Chinese<input type="checkbox" value="Chinese"> </label>
      <label>Indian<input type="checkbox" value="Indian"> </label>
      <label>Mexican<input type="checkbox" value="Mexican"> </label>
      <label>French<input type="checkbox" value="French"> </label>
    </div>

    <!-- Price Range Filters -->
    <div class="filter-group">
      <label for="price-range">Price Range: <span id="price-range-value">50</span></label>
      <input type="range" id="price-range" min="0" max="100" step="10" value="50">
    </div>

    <!-- Rating Filter -->
    <div class="filter-group">
      <label>Rating</label>
      <input type="radio" name="rating" value="5"> 5 Stars<br>
      <input type="radio" name="rating" value="4"> 4 Stars<br>
      <input type="radio" name="rating" value="3"> 3 Stars<br>
    </div>

    <!-- Apply Filters Button -->
    <button id="apply-filters">Apply Filters</button>
  </div>

  <script src="/logic/restaurant_list_logic.js"></script>
</body>

</html>
