  <nav id="navigation-bar"></nav>

  <!-- each restaurant data -->
  <div id="home-feed-container"></div>

  <!-- side filter bar -->
  <div id="side-filter-bar">
    <h3>Filters</h3>

    <!-- Cuisine Filters -->
    <div id="cuisine-filters" class="filter-group">
      <h4>Choose Cuisine</h4>
      <label><span>Indian</span><input type="checkbox" value="Indian"></label>
      <label><span>Italian</span><input type="checkbox" value="Italian"></label>
      <label><span>Chinese</span><input type="checkbox" value="Chinese"></label>
      <label><span>Mexican</span><input type="checkbox" value="Mexican"></label>
      <label><span>French</span><input type="checkbox" value="French"></label>
    </div>

    <!-- Price Range Filters -->
    <div class="filter-group">
      <label for="price-range">Price Range: <span id="price-range-value">50</span></label>
      <input type="range" id="price-range" min="0" max="100" step="10" value="50">
    </div>

    <!-- Rating Filter -->
    <div class="filter-group">
      <label>Rating</label>
      <input type="radio" name="rating" value="5"> 5 Stars<br>
      <input type="radio" name="rating" value="4"> 4 Stars<br>
      <input type="radio" name="rating" value="3"> 3 Stars<br>
    </div>

    <!-- Apply Filters Button -->
    <button id="apply-filters">Apply Filters</button>
  </div>

  <script src="/logic/restaurant_list_logic/restaurant_list_logic.js" type="module"></script>
</body>
